<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健康提醒 · 喝水與站立</title>
<style>
  :root{
    --bg:#F0F7F8;
    --card:#FFFFFF;
    --ink:#0F3B42;
    --ink-soft:#5B7E85;
    --water:#0E7490;
    --water-light:#E0F2F6;
    --stand:#C2731A;
    --stand-light:#FDF0DD;
    --line:#D8E6E9;
    --ok:#15803D;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:"Noto Sans TC","Microsoft JhengHei","PingFang TC",sans-serif;
    background:var(--bg);color:var(--ink);
    min-height:100vh;padding:24px 16px 48px;
  }
  .wrap{max-width:560px;margin:0 auto;}
  header{text-align:center;margin-bottom:20px;}
  header h1{font-size:22px;font-weight:700;letter-spacing:2px;}
  header p{color:var(--ink-soft);font-size:13px;margin-top:4px;}
  #notiState{
    display:inline-block;margin-top:8px;font-size:13px;font-weight:700;
    padding:4px 12px;border-radius:20px;background:var(--card);
    border:1px solid var(--line);
  }
  #notiState.ok{color:var(--ok);}
  #notiState.bad{color:#B91C1C;}

  /* 通知權限提示 */
  #permBanner{
    display:none;background:#FFF7E6;border:1px solid #F0D9A8;
    border-radius:10px;padding:12px 14px;font-size:14px;margin-bottom:16px;
    line-height:1.6;
  }
  #permBanner button{
    margin-top:8px;background:var(--stand);color:#fff;border:none;
    padding:8px 16px;border-radius:8px;font-size:14px;cursor:pointer;
  }

  /* 倒數主卡片 */
  .timers{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
  .timer-card{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:18px 12px;text-align:center;position:relative;
  }
  .timer-card.disabled{opacity:.45;}
  .timer-card .icon{font-size:26px;}
  .timer-card .label{font-size:14px;font-weight:700;margin-top:4px;}
  .timer-card .count{
    font-size:34px;font-weight:700;font-variant-numeric:tabular-nums;
    margin-top:6px;letter-spacing:1px;
  }
  .timer-card.water .count{color:var(--water);}
  .timer-card.stand .count{color:var(--stand);}
  .timer-card .next{font-size:12px;color:var(--ink-soft);margin-top:4px;}
  .timer-card .doneBtn{
    margin-top:10px;border:none;border-radius:8px;padding:8px 0;width:100%;
    font-size:14px;font-weight:700;cursor:pointer;color:#fff;
  }
  .timer-card.water .doneBtn{background:var(--water);}
  .timer-card.stand .doneBtn{background:var(--stand);}
  .timer-card .doneBtn:disabled{background:#B8C9CD;cursor:not-allowed;}

  /* 今日統計 */
  .stats{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:14px;
  }
  .stats .cups{font-size:15px;flex:1;line-height:1.6;}
  .bar{height:12px;background:var(--water-light);border-radius:6px;margin:8px 0;overflow:hidden;}
  .bar .fill{height:100%;background:var(--water);border-radius:6px;width:0;transition:width .3s;}
  .quickRow{display:flex;gap:6px;flex-wrap:wrap;}
  .quickRow button{
    border:1px solid var(--line);background:var(--water-light);color:var(--water);
    border-radius:8px;padding:7px 10px;font-size:13px;font-weight:700;cursor:pointer;
  }
  .quickRow button:active{background:var(--water);color:#fff;}
  #pauseBtn{
    background:var(--ink);color:#fff;border:none;border-radius:8px;
    padding:10px 18px;font-size:14px;cursor:pointer;white-space:nowrap;
  }
  #pauseBtn.paused{background:var(--ok);}

  /* 設定 */
  details{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;margin-bottom:16px;
  }
  summary{font-size:15px;font-weight:700;cursor:pointer;user-select:none;}
  .setRow{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 0;border-bottom:1px dashed var(--line);font-size:14px;gap:8px;
  }
  .setRow:last-child{border-bottom:none;}
  .setRow label{flex:1;}
  .setRow label.switch{flex:none;}
  .setRow input[type=number]{
    width:64px;padding:6px;border:1px solid var(--line);border-radius:6px;
    font-size:14px;text-align:center;
  }
  .setRow input[type=time]{
    padding:5px 6px;border:1px solid var(--line);border-radius:6px;font-size:14px;
  }
  .setRow select{
    padding:6px 4px;border:1px solid var(--line);border-radius:6px;font-size:14px;
    background:#fff;color:var(--ink);
  }
  .setRow .unit{color:var(--ink-soft);font-size:13px;}
  .switch{position:relative;display:inline-block;width:44px;height:24px;flex:none;}
  .switch input{opacity:0;width:0;height:0;}
  .slider{
    position:absolute;inset:0;background:#C4D4D8;border-radius:24px;
    cursor:pointer;transition:.2s;
  }
  .slider:before{
    content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;
    background:#fff;border-radius:50%;transition:.2s;
  }
  .switch input:checked + .slider{background:var(--water);}
  .switch input:checked + .slider:before{transform:translateX(20px);}

  .btnRow{display:flex;gap:10px;}
  .btnRow button{
    flex:1;padding:10px 0;border-radius:8px;border:1px solid var(--line);
    background:var(--card);font-size:14px;cursor:pointer;color:var(--ink);
  }
  .note{font-size:12px;color:var(--ink-soft);line-height:1.8;margin-top:14px;}

  /* 彈出對話框(像 LINE 訊息框,會停留直到按掉) */
  #modalWrap{
    display:none;position:fixed;inset:0;background:rgba(15,59,66,.45);
    z-index:99;align-items:center;justify-content:center;padding:20px;
  }
  #modalWrap.show{display:flex;}
  #modalBox{
    background:#fff;border-radius:16px;padding:26px 22px;max-width:340px;width:100%;
    text-align:center;box-shadow:0 12px 40px rgba(15,59,66,.35);
    animation:pop .25s ease;
  }
  @keyframes pop{from{transform:scale(.8);opacity:0;}to{transform:scale(1);opacity:1;}}
  #modalIcon{font-size:44px;}
  #modalTitle{font-size:19px;font-weight:700;margin-top:8px;}
  #modalBody{font-size:14px;color:var(--ink-soft);margin-top:6px;line-height:1.6;}
  #modalBtns{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;justify-content:center;}
  #modalBtns button{
    border:none;border-radius:10px;padding:11px 14px;font-size:15px;font-weight:700;
    cursor:pointer;flex:1;min-width:86px;
  }
  #modalBtns button.main{background:var(--water);color:#fff;}
  #modalBtns button.warm{background:var(--stand);color:#fff;}
  #modalBtns button.ghost{background:#EDF3F4;color:var(--ink);}
  #toast{
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:10px 20px;border-radius:20px;
    font-size:14px;font-weight:700;opacity:0;pointer-events:none;
    transition:.25s;z-index:98;white-space:nowrap;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  @media (max-width:420px){
    .timers{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>健康提醒</h1>
    <p>分頁保持開啟,提醒才會運作。可釘選分頁避免誤關。</p>
    <span id="notiState"></span>
  </header>

  <div id="permBanner">
    尚未開啟桌面通知權限,提醒只會在此頁面顯示。<br>
    <button onclick="askPermission()">開啟桌面通知</button>
  </div>

  <div class="timers">
    <div class="timer-card water" id="waterCard">
      <div class="icon">&#128167;</div>
      <div class="label">下次喝水</div>
      <div class="count" id="waterCount">--:--</div>
      <div class="next" id="waterNext"></div>
      <button class="doneBtn" id="waterDone" onclick="addWater(1)">喝一口</button>
    </div>
    <div class="timer-card stand" id="standCard">
      <div class="icon">&#129485;</div>
      <div class="label">下次站立</div>
      <div class="count" id="standCount">--:--</div>
      <div class="next" id="standNext"></div>
      <button class="doneBtn" id="standDone" onclick="markStand()">我站過了</button>
    </div>
  </div>

  <div class="stats">
    <div class="cups">
      今日喝水 <b id="mlNum">0</b> / <span id="mlGoal">2000</span> ml(約 <span id="bottleCnt">0</span> 壺)
      <div class="bar"><div class="fill" id="mlFill"></div></div>
      <div class="quickRow">
        <button onclick="addWater(1)" id="qSip1">+一口</button>
        <button onclick="addWater(2)" id="qSip2">+兩口</button>
        <button onclick="addBottle(0.5)" id="qHalf">+半壺</button>
        <button onclick="addBottle(1)" id="qFull">+一壺</button>
      </div>
    </div>
    <button id="pauseBtn" onclick="togglePause()">暫停提醒</button>
  </div>

  <details>
    <summary>設定</summary>
    <div class="setRow">
      <label>喝水提醒</label>
      <label class="switch"><input type="checkbox" id="waterOn" checked><span class="slider"></span></label>
    </div>
    <div class="setRow">
      <label>喝水間隔</label>
      <input type="number" id="waterMin" min="5" max="240" value="60"><span class="unit">分鐘</span>
    </div>
    <div class="setRow">
      <label>每日目標</label>
      <input type="number" id="goalMl" min="500" max="5000" step="100" value="2000"><span class="unit">ml</span>
    </div>
    <div class="setRow">
      <label>一口約</label>
      <input type="number" id="sipMl" min="10" max="100" step="5" value="30"><span class="unit">ml</span>
    </div>
    <div class="setRow">
      <label>水壺容量</label>
      <input type="number" id="bottleMl" min="100" max="2000" step="50" value="400"><span class="unit">ml</span>
    </div>
    <div class="setRow">
      <label>站立提醒(Apple Watch 已有可關閉)</label>
      <label class="switch"><input type="checkbox" id="standOn"><span class="slider"></span></label>
    </div>
    <div class="setRow">
      <label>站立間隔</label>
      <input type="number" id="standMin" min="10" max="240" value="50"><span class="unit">分鐘</span>
    </div>
    <div class="setRow">
      <label>提醒時段</label>
      <span><select id="workStart"></select> ~ <select id="workEnd"></select></span>
    </div>
    <div class="setRow">
      <label>午休不提醒</label>
      <label class="switch"><input type="checkbox" id="lunchOn" checked><span class="slider"></span></label>
    </div>
    <div class="setRow">
      <label>午休時段</label>
      <span><select id="lunchStart"></select> ~ <select id="lunchEnd"></select></span>
    </div>
    <div class="setRow">
      <label>提示音</label>
      <label class="switch"><input type="checkbox" id="soundOn" checked><span class="slider"></span></label>
    </div>
    <div class="setRow">
      <label>彈出獨立提醒視窗(縮小視窗也看得到)</label>
      <label class="switch"><input type="checkbox" id="popupOn" checked><span class="slider"></span></label>
    </div>
    <div class="setRow">
      <label>桌面浮動時鐘(含秒數,置頂可拖曳)</label>
      <label class="switch"><input type="checkbox" id="clockOn"><span class="slider"></span></label>
    </div>
  </details>

  <div class="btnRow">
    <button onclick="testNotify()">測試通知</button>
    <button onclick="resetToday()">重設今日紀錄</button>
  </div>

  <p class="note">
    說明:提醒只在「提醒時段」內出現,午休自動跳過。電腦休眠或分頁關閉時不會提醒。
    時間到會跳出對話框(按掉才消失)並同時發桌面通知。按任何加水按鈕都會記錄 ml 並重新計時;
    「稍後 10 分」會延後這一輪。設定與今日紀錄都存在這台電腦的瀏覽器裡。
  </p>
</div>

<div id="modalWrap">
  <div id="modalBox">
    <div id="modalIcon"></div>
    <div id="modalTitle"></div>
    <div id="modalBody"></div>
    <div id="modalBtns"></div>
  </div>
</div>
<div id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const SETTING_KEYS = ["waterOn","waterMin","goalMl","sipMl","bottleMl","standOn","standMin","workStart","workEnd","lunchOn","lunchStart","lunchEnd","soundOn","popupOn"];
let nextWater = 0, nextStand = 0, paused = false;

/* ---------- 設定存取 ---------- */
function loadSettings(){
  let s = {};
  try{ s = JSON.parse(localStorage.getItem("healthReminderSettings")||"{}"); }catch(e){}
  if(!s.v2){ delete s.workStart; delete s.workEnd; }  /* 舊版設定改用新預設時段 */
  SETTING_KEYS.forEach(k=>{
    const el = $(k);
    if(s[k] === undefined) return;
    if(el.type === "checkbox"){ el.checked = s[k]; return; }
    el.value = s[k];
    if(el.tagName === "SELECT" && el.value !== s[k]){
      /* 舊時間值不在 30 分鐘刻度上,就近對齊 */
      const parts = String(s[k]).split(":").map(Number);
      if(parts.length === 2 && !isNaN(parts[0])){
        let total = Math.round((parts[0]*60 + parts[1]) / 30) * 30;
        if(total >= 1440) total = 1410;
        el.value = String(Math.floor(total/60)).padStart(2,"0") + ":" + String(total%60).padStart(2,"0");
      }
    }
  });
}
function saveSettings(){
  const s = {v2:true};
  SETTING_KEYS.forEach(k=>{
    const el = $(k);
    s[k] = (el.type === "checkbox") ? el.checked : el.value;
  });
  localStorage.setItem("healthReminderSettings", JSON.stringify(s));
}
function onSettingChanged(k){
  saveSettings();
  const affectBoth = ["workStart","workEnd","lunchOn","lunchStart","lunchEnd"].includes(k);
  if(k === "waterMin" || affectBoth) nextWater = Date.now() + mins($("waterMin").value);
  if(k === "standMin" || affectBoth) nextStand = Date.now() + mins($("standMin").value);
  if(affectBoth || k === "waterMin" || k === "standMin") toast("已套用,重新計時");
  else toast("設定已儲存");
  render();
}
SETTING_KEYS.forEach(k=>{
  const el = $(k);
  el.addEventListener("change", ()=>onSettingChanged(k));
  el.addEventListener("input", ()=>onSettingChanged(k));
});
function mins(v){ return Math.max(1, parseInt(v)||60) * 60 * 1000; }

/* ---------- 提示 toast ---------- */
let toastTimer = null;
function toast(msg){
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"), 2000);
}

/* ---------- 今日紀錄 ---------- */
function todayKey(){
  const d = new Date();
  return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}
function getMl(){
  try{
    const r = JSON.parse(localStorage.getItem("healthReminderMl")||"{}");
    return r.date === todayKey() ? (r.ml||0) : 0;
  }catch(e){ return 0; }
}
function setMl(n){
  localStorage.setItem("healthReminderMl", JSON.stringify({date:todayKey(), ml:n}));
}
function sipAmt(){ return Math.max(5, parseInt($("sipMl").value)||30); }
function bottleAmt(){ return Math.max(50, parseInt($("bottleMl").value)||400); }
function addWaterMl(ml){
  setMl(getMl()+ml);
  nextWater = Date.now() + mins($("waterMin").value);
  closeModal();
  render();
}
function addWater(sips){ addWaterMl(sips * sipAmt()); }
function addBottle(f){ addWaterMl(Math.round(f * bottleAmt())); }
function markStand(){
  nextStand = Date.now() + mins($("standMin").value);
  closeModal();
  render();
}
function snoozeWater(){ nextWater = Date.now() + 10*60*1000; closeModal(); render(); }
function snoozeStand(){ nextStand = Date.now() + 10*60*1000; closeModal(); render(); }
function resetToday(){
  if(confirm("確定重設今日喝水紀錄?")){ setMl(0); render(); }
}

/* ---------- 時段判斷 ---------- */
function hmToMin(hm){ const [h,m] = hm.split(":").map(Number); return h*60+m; }
function inWorkTime(){
  const now = new Date();
  const cur = now.getHours()*60 + now.getMinutes();
  const ws = hmToMin($("workStart").value), we = hmToMin($("workEnd").value);
  const cross = ws > we;  /* 結束比開始早 → 跨日時段,例如 10:00~01:00 */
  const inRange = cross ? (cur >= ws || cur < we) : (cur >= ws && cur < we);
  if(!inRange) return false;
  if($("lunchOn").checked){
    const ls = hmToMin($("lunchStart").value), le = hmToMin($("lunchEnd").value);
    if(cur >= ls && cur < le) return false;
  }
  return true;
}

/* ---------- 通知 ---------- */
function askPermission(){
  if(!("Notification" in window)){ alert("此瀏覽器不支援桌面通知"); return; }
  Notification.requestPermission().then(updatePermBanner);
}
function updatePermBanner(){
  const b = $("permBanner"), st = $("notiState");
  let text = "", cls = "bad", banner = "";
  if(!("Notification" in window)){
    text = "❌ 此環境不支援桌面通知";
    banner = "這個開啟方式不支援桌面通知(例如預覽視窗)。請上傳到 GitHub Pages,用 https 網址開啟。";
  }else if(location.protocol === "file:"){
    text = "❌ 本機檔案無法使用桌面通知";
    banner = "直接雙擊檔案開啟時,瀏覽器不允許桌面通知,縮小視窗會收不到提醒。<br>請上傳到 GitHub Pages,用 https 網址開啟後再允許通知。";
  }else if(Notification.permission === "granted"){
    text = "✅ 桌面通知已允許"; cls = "ok";
  }else if(Notification.permission === "denied"){
    text = "❌ 桌面通知被封鎖";
    banner = "桌面通知已被封鎖,縮小視窗時會收不到提醒。<br>請點網址列左邊的鎖頭圖示 → 通知 → 改為「允許」,然後重新整理頁面。";
  }else{
    text = "⚠ 桌面通知尚未允許";
    banner = '尚未開啟桌面通知,縮小視窗時會收不到提醒。<br><button onclick="askPermission()">開啟桌面通知</button>';
  }
  st.textContent = text;
  st.className = cls;
  if(banner){ b.innerHTML = banner; b.style.display = "block"; }
  else b.style.display = "none";
}
setInterval(updatePermBanner, 5000);
/* 共用 AudioContext:靠使用者點擊解鎖,背景時也能發聲 */
let audioCtx = null;
document.addEventListener("click", ()=>{
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state === "suspended") audioCtx.resume();
  }catch(e){}
});
function beep(){
  if(!$("soundOn").checked || !audioCtx) return;
  try{
    if(audioCtx.state === "suspended") audioCtx.resume();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = 880; g.gain.setValueAtTime(0.25, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
    o.start(); o.stop(audioCtx.currentTime + 0.6);
  }catch(e){}
}
function showModal(icon, title, body, btns){
  $("modalIcon").textContent = icon;
  $("modalTitle").textContent = title;
  $("modalBody").textContent = body;
  const wrap = $("modalBtns");
  wrap.innerHTML = "";
  btns.forEach(b=>{
    const el = document.createElement("button");
    el.textContent = b.text;
    el.className = b.cls;
    el.onclick = b.fn;
    wrap.appendChild(el);
  });
  $("modalWrap").classList.add("show");
}
function closeModal(){ $("modalWrap").classList.remove("show"); }

function waterModal(){
  showModal("💧","該喝水了","今日已喝 " + getMl() + " ml,補充一點吧",[
    {text:"一口 +"+sipAmt()+"ml", cls:"main", fn:()=>addWater(1)},
    {text:"兩口 +"+(sipAmt()*2)+"ml", cls:"main", fn:()=>addWater(2)},
    {text:"半壺 +"+Math.round(bottleAmt()/2)+"ml", cls:"main", fn:()=>addBottle(0.5)},
    {text:"稍後 10 分", cls:"ghost", fn:snoozeWater}
  ]);
}
function standModal(){
  showModal("🧍","該站起來了","離開座位活動 2~3 分鐘",[
    {text:"我站過了", cls:"warm", fn:markStand},
    {text:"稍後 10 分", cls:"ghost", fn:snoozeStand}
  ]);
}

let lastNotifyError = "";
function notify(title, body, tag){
  beep();
  if(("Notification" in window) && Notification.permission === "granted"){
    try{
      const n = new Notification(title, {body:body, tag:tag, renotify:true, requireInteraction:true});
      n.onclick = ()=>{ window.focus(); n.close(); };
      return n;
    }catch(e){ lastNotifyError = e.message; }
  }
  return null;
}
function testNotify(){
  const send = ()=>{
    const n = notify("測試通知 ✅", "縮小視窗時就是靠這個提醒你", "test");
    if(!n){
      $("modalBody").textContent = "❌ 通知建立失敗:" + (lastNotifyError || "未知原因");
      return;
    }
    n.onshow = ()=>{
      $("modalBody").textContent = "✅ Chrome 回報:通知已送出並顯示。如果右下角還是沒看到,問題在 Windows 顯示層(見下方建議)。";
    };
    n.onerror = ()=>{
      $("modalBody").textContent = "❌ Chrome 回報:通知顯示失敗。Chrome 與 Windows 通知系統的連結可能損壞,請先完全重啟 Chrome 再試。";
    };
  };
  let stateMsg;
  if(!("Notification" in window)){
    stateMsg = "此瀏覽器不支援桌面通知,縮小視窗時無法提醒";
  }else if(Notification.permission === "granted"){
    stateMsg = "已發送測試通知,等待 Chrome 回報結果…";
  }else if(Notification.permission === "denied"){
    stateMsg = "桌面通知被封鎖了!請點網址列的鎖頭圖示 → 通知 → 允許,再重新整理";
  }else{
    stateMsg = "請在瀏覽器跳出的詢問視窗按「允許」,允許後會再發一則測試通知";
    Notification.requestPermission().then(p=>{
      updatePermBanner();
      if(p === "granted") send();
    });
  }
  showModal("✅","測試彈窗", stateMsg, [
    {text:"知道了", cls:"main", fn:closeModal}
  ]);
  popupReminder("test");
  if(("Notification" in window) && Notification.permission === "granted") send();
}

/* ---------- 獨立彈出提醒視窗(不依賴系統通知) ---------- */
function popupReminder(type){
  if(!$("popupOn").checked) return;
  try{
    const wpx = 360, hpx = 320;
    const left = Math.max(0, (screen.availWidth||1000) - wpx - 24);
    const top = Math.max(0, (screen.availHeight||700) - hpx - 60);
    const p = window.open("", "hb_reminder",
      "width=" + wpx + ",height=" + hpx + ",left=" + left + ",top=" + top + ",popup=yes");
    if(!p){
      toast("彈出視窗被封鎖!點網址列右側圖示 → 一律允許");
      return;
    }
    let icon, title, body, btns;
    if(type === "water"){
      icon = "💧"; title = "該喝水了"; body = "今日已喝 " + getMl() + " ml";
      btns = '<button style="background:#0E7490" onclick="opener.addWater(1);window.close()">一口 +' + sipAmt() + 'ml</button>'
           + '<button style="background:#0E7490" onclick="opener.addWater(2);window.close()">兩口 +' + (sipAmt()*2) + 'ml</button>'
           + '<button style="background:#0E7490" onclick="opener.addBottle(0.5);window.close()">半壺 +' + Math.round(bottleAmt()/2) + 'ml</button>'
           + '<button style="background:#8DA6AB" onclick="opener.snoozeWater();window.close()">稍後 10 分</button>';
    }else if(type === "stand"){
      icon = "🧍"; title = "該站起來了"; body = "離開座位活動 2~3 分鐘";
      btns = '<button style="background:#C2731A" onclick="opener.markStand();window.close()">我站過了</button>'
           + '<button style="background:#8DA6AB" onclick="opener.snoozeStand();window.close()">稍後 10 分</button>';
    }else{
      icon = "✅"; title = "測試彈出視窗"; body = "提醒時間到就會像這樣跳出來";
      btns = '<button style="background:#0E7490" onclick="window.close()">關閉</button>';
    }
    p.document.write(
      '<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><title>健康提醒</title>'
      + '<style>body{font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;background:#F0F7F8;'
      + 'display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;margin:0;text-align:center;}'
      + '.ic{font-size:48px;}h2{margin:8px 0 4px;color:#0F3B42;font-size:20px;}'
      + 'p{margin:0 0 14px;color:#5B7E85;font-size:14px;}'
      + '.bs{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:0 14px;}'
      + '.bs button{border:none;border-radius:10px;padding:11px 14px;font-size:15px;font-weight:700;'
      + 'color:#fff;cursor:pointer;min-width:100px;}</style></head><body>'
      + '<div class="ic">' + icon + '</div><h2>' + title + '</h2><p>' + body + '</p>'
      + '<div class="bs">' + btns + '</div></body></html>'
    );
    p.document.close();
    p.focus();
  }catch(e){}
}

    + '</style>'
    + '<div id="wrap"><div id="ck"></div>'
    + '<div id="mv"><div id="fc"><div id="bb"><img src="' + CLOCK_IMG + '"></div></div></div></div>';
}
let clockWin = null, clockTimer = null;
function stopClock(){
  clearInterval(clockTimer); clockTimer = null;
  if(clockWin){ try{ clockWin.close(); }catch(e){} clockWin = null; }
}
function clockClosedByUser(){
  clearInterval(clockTimer); clockTimer = null; clockWin = null;
  $("clockOn").checked = false;
}
function startClockLoop(el){
  const pad = v => String(v).padStart(2,"0");
  const upd = ()=>{
    const n = new Date();
    el.textContent = pad(n.getHours()) + ":" + pad(n.getMinutes()) + ":" + pad(n.getSeconds());
  };
  upd();
  clockTimer = setInterval(upd, 250);
}
async function toggleClock(on){
  if(!on){ stopClock(); return; }
  /* 優先:文件子母畫面(永遠置頂,可拖曳到螢幕任意位置) */
  if("documentPictureInPicture" in window){
    try{
      clockWin = await documentPictureInPicture.requestWindow({ width: 260, height: 56 });
      const doc = clockWin.document;
      doc.body.style.cssText = "margin:0;";
      doc.body.innerHTML = clockInnerHTML();
      startClockLoop(doc.getElementById("ck"));
      clockWin.addEventListener("pagehide", clockClosedByUser);
      toast("時鐘已置頂,可直接拖曳到左下角");
      return;
    }catch(e){ /* 失敗則改用一般小視窗 */ }
  }
  /* 退路:一般小視窗(可拖曳,但可能被其他視窗蓋住) */
  try{
    const top = Math.max(0, (screen.availHeight||700) - 140);
    const p = window.open("", "hb_clock", "width=260,height=72,left=8,top=" + top + ",popup=yes");
    if(!p){
      toast("彈出視窗被封鎖!點網址列右側圖示 → 一律允許");
      $("clockOn").checked = false;
      return;
    }
    p.document.write(
      '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>時鐘</title></head>'
      + '<body style="margin:0;">' + clockInnerHTML() + '</body></html>'
    );
    p.document.close();
    clockWin = p;
    startClockLoop(p.document.getElementById("ck"));
    const watch = setInterval(()=>{
      if(!clockWin || clockWin.closed){ clearInterval(watch); clockClosedByUser(); }
    }, 1000);
    toast("此瀏覽器不支援置頂,時鐘視窗可能被蓋住");
  }catch(e){
    $("clockOn").checked = false;
  }
}
$("clockOn").addEventListener("change", e => toggleClock(e.target.checked));

/* ---------- 主迴圈 ---------- */
let wasWorking = false;
function tick(){
  const now = Date.now();
  const working = !paused && inWorkTime();
  if(working && !wasWorking){
    /* 剛進入提醒時段(含午休結束):重新起算 */
    nextWater = now + mins($("waterMin").value);
    nextStand = now + mins($("standMin").value);
  }
  wasWorking = working;
  if(working){
    if($("waterOn").checked && now >= nextWater){
      notify("該喝水了 💧", "今日已喝 " + getMl() + " ml", "water");
      waterModal();
      popupReminder("water");
      nextWater = now + mins($("waterMin").value);
    }
    if($("standOn").checked && now >= nextStand){
      notify("該站起來了 🧍", "離開座位活動 2~3 分鐘", "stand");
      standModal();
      popupReminder("stand");
      nextStand = now + mins($("standMin").value);
    }
  }
  render();
}
function fmtCountdown(t){
  const diff = Math.max(0, t - Date.now());
  const m = Math.floor(diff/60000), s = Math.floor(diff%60000/1000);
  return String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
}
function fmtClock(t){
  const d = new Date(t);
  return String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
}
function afterEnd(t){
  const n = new Date();
  const cur = n.getHours()*60 + n.getMinutes();
  const ws = hmToMin($("workStart").value), we = hmToMin($("workEnd").value);
  /* 計算本輪時段實際結束的時間點(跨日時段結束在隔天) */
  let endDay = n.getDate();
  if(ws > we && cur >= ws) endDay += 1;
  const endTs = new Date(n.getFullYear(), n.getMonth(), endDay, 0, we).getTime();
  return t >= endTs;
}
function render(){
  const ml = getMl(), goal = Math.max(100, parseInt($("goalMl").value)||2000);
  $("mlNum").textContent = ml;
  $("mlGoal").textContent = goal;
  $("bottleCnt").textContent = (ml / bottleAmt()).toFixed(1);
  $("mlFill").style.width = Math.min(100, ml/goal*100) + "%";
  $("qSip1").textContent = "+一口 " + sipAmt() + "ml";
  $("qSip2").textContent = "+兩口 " + (sipAmt()*2) + "ml";
  $("qHalf").textContent = "+半壺 " + Math.round(bottleAmt()/2) + "ml";
  $("qFull").textContent = "+一壺 " + bottleAmt() + "ml";
  $("waterDone").textContent = "喝一口 +" + sipAmt() + "ml";

  const working = inWorkTime() && !paused;
  let stateText = "";
  if(paused){ stateText = "已暫停"; }
  else if(!inWorkTime()){
    const n = new Date();
    const cur = n.getHours()*60 + n.getMinutes();
    const curHM = String(n.getHours()).padStart(2,"0") + ":" + String(n.getMinutes()).padStart(2,"0");
    const ls = $("lunchStart").value, le = $("lunchEnd").value;
    if($("lunchOn").checked && cur >= hmToMin(ls) && cur < hmToMin(le)){
      stateText = "午休中(" + ls + "~" + le + "),暫停提醒";
    }else{
      stateText = "現在 " + curHM + ",不在時段 " + $("workStart").value + "~" + $("workEnd").value + " 內";
    }
  }

  $("waterCard").classList.toggle("disabled", !$("waterOn").checked);
  $("standCard").classList.toggle("disabled", !$("standOn").checked);

  $("waterCount").textContent = working && $("waterOn").checked ? fmtCountdown(nextWater) : "--:--";
  $("standCount").textContent = working && $("standOn").checked ? fmtCountdown(nextStand) : "--:--";
  $("waterNext").textContent = working && $("waterOn").checked
    ? (afterEnd(nextWater) ? "⚠ 超過今日時段,不會提醒" : "預計 " + fmtClock(nextWater)) : stateText;
  $("standNext").textContent = working && $("standOn").checked
    ? (afterEnd(nextStand) ? "⚠ 超過今日時段,不會提醒" : "預計 " + fmtClock(nextStand)) : stateText;

  if($("modalWrap").classList.contains("show")){
    document.title = "🔔 有提醒!點回來看";
  }else{
    document.title = working
      ? ("💧" + fmtCountdown(nextWater).slice(0,2) + "分 · 健康提醒")
      : "健康提醒";
  }
}
function togglePause(){
  paused = !paused;
  const b = $("pauseBtn");
  b.textContent = paused ? "繼續提醒" : "暫停提醒";
  b.classList.toggle("paused", paused);
  if(!paused){
    nextWater = Date.now() + mins($("waterMin").value);
    nextStand = Date.now() + mins($("standMin").value);
  }
  render();
}

/* ---------- 啟動 ---------- */
/* 產生 24 小時制時間選項(每 30 分鐘一格) */
function fillTimeSelect(id, def){
  const el = $(id);
  for(let h=0; h<24; h++){
    for(const m of ["00","30"]){
      const v = String(h).padStart(2,"0") + ":" + m;
      const o = document.createElement("option");
      o.value = v; o.textContent = v;
      el.appendChild(o);
    }
  }
  el.value = def;
}
fillTimeSelect("workStart","10:00");
fillTimeSelect("workEnd","19:00");
fillTimeSelect("lunchStart","12:00");
fillTimeSelect("lunchEnd","13:00");
loadSettings();
saveSettings();  /* 完成設定版本遷移 */
updatePermBanner();
nextWater = Date.now() + mins($("waterMin").value);
nextStand = Date.now() + mins($("standMin").value);
render();
setInterval(tick, 1000);
</script>
